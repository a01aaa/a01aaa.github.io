<script>
	var home_Path = document.location.protocol + '//' + window.document.location.hostname + ":" + window.document.location.port + '/';
	var userAgent = window.navigator.userAgent.toLowerCase();
	var norunAI = ["android", "iphone", "ipod", "ipad", "windows phone", "mqqbrowser", "msie", "trident/7.0"];
	var norunFlag = false;

	for (var i = 0; i < norunAI.length; i++) {
		if (userAgent.indexOf(norunAI[i]) > -1) {
			norunFlag = true;
			break;
		}
	}

	if (!window.WebGLRenderingContext) {
		norunFlag = true;
	}

	if (!norunFlag) {
		var hitFlag = false;
		var AIFadeFlag = false;
		var liveTlakTimer = null;
		var sleepTimer_ = null;
		var AITalkFlag = false;
		var talkNum = 0;
		(function () {
			function renderTip(template, context) {
				var tokenReg = /(\\)?\{([^\{\}\\]+)(\\)?\}/g;
				return template.replace(tokenReg, function (word, slash1, token, slash2) {
					if (slash1 || slash2) {
						return word.replace('\\', '');
					}
					var variables = token.replace(/\s/g, '').split('.');
					var currentObject = context;
					var i, length, variable;
					for (i = 0, length = variables.length; i < length; ++i) {
						variable = variables[i];
						currentObject = currentObject[variable];
						if (currentObject === undefined || currentObject === null) return '';
					}
					return currentObject;
				});
			}

			String.prototype.renderTip = function (context) {
				return renderTip(this, context);
			};

			var re = /x/;
			re.toString = function () {
				showMessage('哈哈，你打开了控制台，是想要看看我的秘密吗？', 5000);
				return '';
			};

			$(document).on('copy', function () {
				showMessage('你都复制了些什么呀，转载要记得加上出处哦~~', 5000);
			});

			function initTips() {
				$.ajax({
					cache: true,
					url: message_Path + 'message.json',
					dataType: "json",
					success: function (result) {
						$.each(result.mouseover, function (index, tips) {
							$(tips.selector).mouseover(function () {
								var text = tips.text;
								if (Array.isArray(tips.text)) text = tips.text[Math.floor(Math.random() * tips.text.length + 1) - 1];
								text = text.renderTip({ text: $(this).text() });
								showMessage(text, 3000);
								talkValTimer();
								clearInterval(liveTlakTimer);
								liveTlakTimer = null;
							});
							$(tips.selector).mouseout(function () {
								showHitokoto();
								if (liveTlakTimer == null) {
									liveTlakTimer = window.setInterval(function () {
										showHitokoto();
									}, 15000);
								};
							});
						});
						$.each(result.click, function (index, tips) {
							$(tips.selector).click(function () {
								if (hitFlag) {
									return false
								}
								hitFlag = true;
								setTimeout(function () {
									hitFlag = false;
								}, 8000);
								var text = tips.text;
								if (Array.isArray(tips.text)) text = tips.text[Math.floor(Math.random() * tips.text.length + 1) - 1];
								text = text.renderTip({ text: $(this).text() });
								showMessage(text, 3000);
							});
							clearInterval(liveTlakTimer);
							liveTlakTimer = null;
							if (liveTlakTimer == null) {
								liveTlakTimer = window.setInterval(function () {
									showHitokoto();
								}, 15000);
							};
						});
					}
				});
			}
			initTips();

			var text;
			if (document.referrer !== '') {
				var referrer = document.createElement('a');
				referrer.href = document.referrer;
				text = '嗨！来自 <span style="color:#0099cc;">' + referrer.hostname + '</span> 的朋友！';
				var domain = referrer.hostname.split('.')[1];
				if (domain == 'baidu') {
					text = '嗨！ 来自 百度搜索 的朋友！<br>欢迎访问<span style="color:#0099cc;">「 ' + document.title.split(' - ')[0] + ' 」</span>';
				} else if (domain == 'so') {
					text = '嗨！ 来自 360搜索 的朋友！<br>欢迎访问<span style="color:#0099cc;">「 ' + document.title.split(' - ')[0] + ' 」</span>';
				} else if (domain == 'google') {
					text = '嗨！ 来自 谷歌搜索 的朋友！<br>欢迎访问<span style="color:#0099cc;">「 ' + document.title.split(' - ')[0] + ' 」</span>';
				}
			} else {
				if (window.location.href == home_Path) { //主页URL判断，需要斜杠结尾
					var now = (new Date()).getHours();
					if (now > 23 || now <= 5) {
						text = '你是夜猫子呀？这么晚还不睡觉，明天起的来嘛？';
					} else if (now > 5 && now <= 7) {
						text = '早上好！一日之计在于晨，美好的一天就要开始了！';
					} else if (now > 7 && now <= 11) {
						text = '上午好！工作顺利嘛，不要久坐，多起来走动走动哦！';
					} else if (now > 11 && now <= 14) {
						text = '中午了，工作了一个上午，现在是午餐时间！';
					} else if (now > 14 && now <= 17) {
						text = '午后很容易犯困呢，今天的运动目标完成了吗？';
					} else if (now > 17 && now <= 19) {
						text = '傍晚了！窗外夕阳的景色很美丽呢，最美不过夕阳红~~';
					} else if (now > 19 && now <= 21) {
						text = '晚上好，今天过得怎么样？';
					} else if (now > 21 && now <= 23) {
						text = '已经这么晚了呀，早点休息吧，晚安~~';
					} else {
						text = '嗨~ 快来逗我玩吧！';
					}
				} else {
					text = '欢迎阅读<span style="color:#0099cc;">「 ' + document.title.split(' - ')[0] + ' 」</span>';
				}
			}
			showMessage(text, 12000);
		})();

		liveTlakTimer = setInterval(function () {
			showHitokoto();
		}, 15000);

		function showHitokoto() {
			if (sessionStorage.getItem("Sleepy") !== "1") {
				if (!AITalkFlag) {
					$.getJSON('https://v1.hitokoto.cn/', function (result) {
						talkValTimer();
						showMessage(result.hitokoto, 0);
					});
				}
			} else {
				hideMessage(0);
				if (sleepTimer_ == null) {
					sleepTimer_ = setInterval(function () {
						checkSleep();
					}, 200);
				}
			}
		}

		function checkSleep() {
			var sleepStatu = sessionStorage.getItem("Sleepy");
			if (sleepStatu !== '1') {
				talkValTimer();
				showMessage('你回来啦~', 0);
				clearInterval(sleepTimer_);
				sleepTimer_ = null;
			}
		}

		function showMessage(text, timeout) {
			if (Array.isArray(text)) text = text[Math.floor(Math.random() * text.length + 1) - 1];
			$('.message').stop();
			$('.message').html(text);
			$('.message').fadeTo(200, 1);
			//if (timeout === null) timeout = 5000;
			//hideMessage(timeout);
		}
		function talkValTimer() {
			$('#live_talk').val('1');
		}

		function hideMessage(timeout) {
			//$('.message').stop().css('opacity',1);
			if (timeout === null) timeout = 5000;
			$('.message').delay(timeout).fadeTo(200, 0);
		}

		function initLive2d() {
			$('#hideButton').on('click', function () {
				if (AIFadeFlag) {
					return false;
				} else {
					AIFadeFlag = true;
					localStorage.setItem("live2dhidden", "0");
					$('#landlord').fadeOut(200);
					$('#open_live2d').delay(200).fadeIn(200);
					setTimeout(function () {
						AIFadeFlag = false;
					}, 300);
				}
			});
			$('#open_live2d').on('click', function () {
				if (AIFadeFlag) {
					return false;
				} else {
					AIFadeFlag = true;
					localStorage.setItem("live2dhidden", "1");
					$('#open_live2d').fadeOut(200);
					$('#landlord').delay(200).fadeIn(200);
					setTimeout(function () {
						AIFadeFlag = false;
					}, 300);
				}
			});
			$('#youduButton').on('click', function () {
				if ($('#youduButton').hasClass('doudong')) {
					var typeIs = $('#youduButton').attr('data-type');
					$('#youduButton').removeClass('doudong');
					$('body').removeClass(typeIs);
					$('#youduButton').attr('data-type', '');
				} else {
					var duType = $('#duType').val();
					var duArr = duType.split(",");

  function scrollAnimation(currentY, targetY) {

    let needScrollTop = targetY - currentY
    let _currentY = currentY
    setTimeout(() => {
      const dist = Math.ceil(needScrollTop / 10)
      _currentY += dist
      window.scrollTo(_currentY, currentY)
      if (needScrollTop > 10 || needScrollTop < -10) {
        scrollAnimation(_currentY, targetY)
      } else {
        window.scrollTo(_currentY, targetY)
      }
    }, 1)
  }

  back2Top.addEventListener("click", function(e) {
    scrollAnimation(document.scrollingElement.scrollTop, 0);
    e.stopPropagation();
    return false;
  });

  window.addEventListener('scroll', function(e) {
    let percent = document.scrollingElement.scrollTop / (document.scrollingElement.scrollHeight - document.scrollingElement.clientHeight) * 100;
    if (percent > 1 && !back2Top.classList.contains('back-top-active')) {
      back2Top.classList.add('back-top-active');
    }
    if (percent == 0) {
      back2Top.classList.remove('back-top-active');

    if (back2TopText) {

<script>
  //拿来主义(真香)^_^，Clipboard 实现摘自掘金 https://juejin.im/post/5aefeb6e6fb9a07aa43c20af
  window.Clipboard = (function (window, document, navigator) {
    var textArea,
      copy;

    // 判断是不是ios端
    function isOS() {
      return navigator.userAgent.match(/ipad|iphone/i);
    }
    //创建文本元素
    function createTextArea(text) {
      textArea = document.createElement('textArea');
      textArea.value = text;
      textArea.style.width = 0;
      textArea.style.height = 0;
      textArea.clientHeight = 0;
      textArea.clientWidth = 0;
      document.body.appendChild(textArea);
    }
    //选择内容
    function selectText() {
      var range,
        selection;

      if (isOS()) {
        range = document.createRange();
        range.selectNodeContents(textArea);
        selection = window.getSelection();
        selection.removeAllRanges();
        selection.addRange(range);
        textArea.setSelectionRange(0, 999999);
      } else {
        textArea.select();
      }
    }

    //复制到剪贴板
    function copyToClipboard() {
      try {
        document.execCommand("Copy")
      } catch (err) {
        alert("复制错误！请手动复制！")
      }
      document.body.removeChild(textArea);
    }

    copy = function (text) {
      createTextArea(text);
      selectText();
      copyToClipboard();
    };

    return {
      copy: copy
    };
  })(window, document, navigator);

  function copyCode(e) {
    if (e.srcElement.tagName === 'SPAN' && e.srcElement.classList.contains('copy-code')) {
      let code = e.currentTarget.querySelector('code');
      var text = code.innerText;
      if (e.srcElement.textContent === '复制成功') {
        console.log('复制操作频率过高');
        return;
      }
      e.srcElement.textContent = '复制成功';
      (function (elem) {
        setTimeout(() => {
          if (elem.textContent === '复制成功') {
            elem.textContent = '复制代码'
          }
        }, 1000);
      })(e.srcElement)
      Clipboard.copy(text);
    }
  }

  let pres = document.querySelectorAll('pre');
  pres.forEach(pre => {
    let code = pre.querySelector('code');
    let copyElem = document.createElement('span');
    copyElem.classList.add('copy-code');
    copyElem.textContent = '复制代码';
    pre.appendChild(copyElem);
    pre.onclick = copyCode
  })
</script>

&lt;p&gt;使用&lt;code&gt;:happy:&lt;/code&gt;输入表情:happy:,使用&lt;code&gt;:sad:&lt;/code&gt;输入表情:sad:,使用&lt;code&gt;:cry:&lt;/code&gt;输入表情😢等。以此类推！&lt;/p&gt;
&lt;h3 id=&#34;下划线&#34;&gt;下划线&lt;/h3&gt;
&lt;p&gt;用HTML的语法&lt;code&gt;&amp;lt;u&amp;gt;Underline&amp;lt;/u&amp;gt;&lt;/code&gt;将产生下划线&lt;u&gt;Underline&lt;/u&gt;.&lt;/p&gt;
&lt;h3 id=&#34;删除线&#34;&gt;删除线&lt;/h3&gt;
&lt;p&gt;GFM添加了删除文本的语法，这是标准的Markdown语法木有的。使用&lt;code&gt;~~&lt;/code&gt;包裹的文本将会具有删除的样式，例如&lt;code&gt;~删除文本~&lt;/code&gt;将产生&lt;s&gt;删除文本&lt;/s&gt;的样式。&lt;/p&gt;
&lt;h3 id=&#34;代码&#34;&gt;代码&lt;/h3&gt;
&lt;ul&gt;
&lt;li&gt;使用`包裹的内容将会以代码样式显示，例如&lt;/li&gt;
&lt;/ul&gt;
&lt;pre&gt;&lt;code&gt;使用`printf()`
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;则会产生&lt;code&gt;printf()&lt;/code&gt;样式。&lt;/p&gt;
&lt;ul&gt;
&lt;li&gt;
&lt;p&gt;输入&lt;code&gt;~~~&lt;/code&gt;或者```然后回车，可以输入代码块，并且可以选择代码的语言。例如：&lt;/p&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;pre&gt;&lt;code&gt;```java
public Class HelloWorld{
  System.out.println(&amp;quot;Hello World!&amp;quot;);
}
```
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;将会产生&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-java&#34;&gt;public Class HelloWorld{
  System.out.println(&amp;quot;Hello World!&amp;quot;);
}
&lt;/code&gt;&lt;/pre&gt;
&lt;h3 id=&#34;强调&#34;&gt;强调&lt;/h3&gt;
&lt;p&gt;使用两个*号或者两个_包裹的内容将会被强调。例如&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;**使用两个*号强调内容**
__使用两个下划线强调内容__
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;将会输出&lt;/p&gt;
&lt;p&gt;&lt;strong&gt;使用两个*号强调内容&lt;/strong&gt;&lt;br&gt;
&lt;strong&gt;使用两个下划线强调内容&lt;/strong&gt;&lt;br&gt;
Typroa 推荐使用两个*号。&lt;/p&gt;
&lt;h3 id=&#34;斜体&#34;&gt;斜体&lt;/h3&gt;
&lt;p&gt;在标准的Markdown语法中，*和_包裹的内容会是斜体显示，但是GFM下划线一般用来分隔人名和代码变量名，因此我们推荐是用星号来包裹斜体内容。如果要显示星号，则使用转义：&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;\*
&lt;/code&gt;&lt;/pre&gt;
&lt;h3 id=&#34;插入图片&#34;&gt;插入图片&lt;/h3&gt;
&lt;p&gt;我们可以通过拖拉的方式，将本地文件夹中的图片或者网络上的图片插入。&lt;/p&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;1&#34;&gt;&lt;img src=&#34;http://typora.io/img/drag-img.gif&#34; alt=&#34;drag and drop image&#34; loading=&#34;lazy&#34;&gt;&lt;/figure&gt;
&lt;/li&gt;
&lt;/ul&gt;
&lt;h3 id=&#34;插入url连接&#34;&gt;插入URL连接&lt;/h3&gt;
&lt;p&gt;使用尖括号包裹的url将产生一个连接，例如：&lt;code&gt;&amp;lt;www.baidu.com&amp;gt;&lt;/code&gt;将产生连接:&amp;lt;www.baidu.com&amp;gt;.&lt;/p&gt;
&lt;p&gt;如果是标准的url，则会自动产生连接，例如:www.google.com&lt;/p&gt;
&lt;h3 id=&#34;目录列表table-of-contentstoc&#34;&gt;目录列表Table of Contents（TOC）&lt;/h3&gt;
&lt;p&gt;输入[toc]然后回车，将会产生一个目录，这个目录抽取了文章的所有标题，自动更新内容。&lt;/p&gt;
&lt;h3 id=&#34;水平分割线&#34;&gt;水平分割线&lt;/h3&gt;
&lt;p&gt;使用&lt;code&gt;***&lt;/code&gt;或者&lt;code&gt;---&lt;/code&gt;，然后回车，来产生水平分割线。&lt;/p&gt;
&lt;hr&gt;
&lt;h3 id=&#34;标注&#34;&gt;标注&lt;/h3&gt;
&lt;p&gt;我们可以对某一个词语进行标注。例如&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;某些人用过了才知道[^注释]
[^注释]:Somebody that I used to know.
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;将产生：&lt;/p&gt;
&lt;p&gt;某些人用过了才知道&lt;sup class=&#34;footnote-ref&#34;&gt;&lt;a href=&#34;#fn1&#34; id=&#34;fnref1&#34;&gt;[1]&lt;/a&gt;&lt;/sup&gt;&lt;/p&gt;
&lt;p&gt;把鼠标放在&lt;code&gt;注释&lt;/code&gt;上，将会有提示内容。&lt;/p&gt;
&lt;h3 id=&#34;表格&#34;&gt;表格&lt;/h3&gt;
&lt;pre&gt;&lt;code&gt;|姓名|性别|毕业学校|工资|
|:---|:---:|:---:|---:|
|杨洋|男|重庆交通大学|3200|
|峰哥|男|贵州大学|5000|
|坑货|女|北京大学|2000|
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;将产生:&lt;/p&gt;
&lt;table&gt;
&lt;thead&gt;
&lt;tr&gt;
&lt;th style=&#34;text-align:left&#34;&gt;姓名&lt;/th&gt;
&lt;th style=&#34;text-align:center&#34;&gt;性别&lt;/th&gt;
&lt;th style=&#34;text-align:center&#34;&gt;毕业学校&lt;/th&gt;
&lt;th style=&#34;text-align:right&#34;&gt;工资&lt;/th&gt;
&lt;/tr&gt;
&lt;/thead&gt;
&lt;tbody&gt;
&lt;tr&gt;
&lt;td style=&#34;text-align:left&#34;&gt;杨洋&lt;/td&gt;
&lt;td style=&#34;text-align:center&#34;&gt;男&lt;/td&gt;
&lt;td style=&#34;text-align:center&#34;&gt;重庆交通大学&lt;/td&gt;
&lt;td style=&#34;text-align:right&#34;&gt;3200&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td style=&#34;text-align:left&#34;&gt;峰哥&lt;/td&gt;
&lt;td style=&#34;text-align:center&#34;&gt;男&lt;/td&gt;
&lt;td style=&#34;text-align:center&#34;&gt;贵州大学&lt;/td&gt;
&lt;td style=&#34;text-align:right&#34;&gt;5000&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td style=&#34;text-align:left&#34;&gt;坑货&lt;/td&gt;
&lt;td style=&#34;text-align:center&#34;&gt;女&lt;/td&gt;
&lt;td style=&#34;text-align:center&#34;&gt;北京大学&lt;/td&gt;
&lt;td style=&#34;text-align:right&#34;&gt;2000&lt;/td&gt;
&lt;/tr&gt;
&lt;/tbody&gt;
&lt;/table&gt;
&lt;p&gt;其中代码的第二行指定对齐的方式，第一个是左对齐，第二个和第三个是居中，最后一个是右对齐。&lt;/p&gt;
&lt;h3 id=&#34;数学表达式块&#34;&gt;数学表达式块&lt;/h3&gt;
&lt;p&gt;输入两个美元符号，然后回车，就可以输入数学表达式块了。例如：&lt;/p&gt;

&lt;h3 id=&#34;任务列表&#34;&gt;任务列表&lt;/h3&gt;

- [ ] 逛街
- [ ] 看电影

&lt;/code&gt;&lt;/pre&gt;
&lt;ul class=&#34;contains-task-list&#34;&gt;

&lt;/li&gt;

&lt;/li&gt;

&lt;/li&gt;

&lt;p&gt;&lt;input class=&#34;task-list-item-checkbox&#34; checked=&#34;&#34; disabled=&#34;&#34; type=&#34;checkbox&#34; id=&#34;task-item-7480721&#34;&gt;&lt;label class=&#34;task-list-item-label&#34; for=&#34;task-item-7480721&#34;&gt; 约泡&lt;/label&gt;&lt;/p&gt;

&lt;h3 id=&#34;列表&#34;&gt;列表&lt;/h3&gt;
&lt;p&gt;输入+, -, *,创建无序的列表，使用任意数字开头，创建有序列表，例如：&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;**无序的列表**
* tfboys
* 杨洋
* 我爱你
&lt;/code&gt;&lt;/pre&gt;

&lt;ul&gt;

&lt;li&gt;杨洋&lt;/li&gt;
&lt;li&gt;我爱你&lt;/li&gt;
&lt;/ul&gt;
&lt;pre&gt;&lt;code&gt;**有序的列表**
1. 苹果

        <a class="result-title" href="https://a01aaa.github.io/post/sui-bi-za-tan/"" data-c="
          &lt;h1 id=&#34;一-关于兴趣&#34;&gt;一、关于兴趣&lt;/h1&gt;
&lt;p&gt;​&lt;/p&gt;
&lt;p&gt;​    因为这疫情，赋闲这么长时间在家，之前一直没时间玩、没时间做的都在这无聊的当儿一一玩了个遍，摸了个透。&lt;/p&gt;
&lt;p&gt;​     最后我发现我真的是对植物一点都不感兴趣，可能只对冷冰冰的机械和程序、代码感兴趣，我想我当初真的应该去机电学院或者信院。不得不说，确实，兴趣才是最好的老师。&lt;/p&gt;
&lt;p&gt;​     俗话说，女怕嫁错郎，男怕入错行😂 。不得不说，专业上写的那几个字对一个人发展的束缚还是蛮大的。马上就要毕业了，可能这神圣的大学四年也就成了人生中永远的一点遗憾了吧。之前一直不好意思或者是碍于面子不会这么直接直白地说出来承认，今天在这敢这么说出来也算是向前跨出了一步吧，彻底迈出了一个久滞的圈。话说，既然自己没有那种读了大学和专业以后果断放弃并回去重考、重新选择的勇气，那就走好前方的路吧还是。再细想想，谁又能做到自己做的就是自己喜欢的呢，不论是学习还是以后的工作、生活或者其他。随心所欲应该是每个人内心中的奢望吧。所以说，还是理性平常看待吧。（不想多展开细讲了）&lt;/p&gt;
&lt;h1 id=&#34;二-关于blog&#34;&gt;二、关于Blog&lt;/h1&gt;
&lt;blockquote&gt;
&lt;p&gt;最近迷上了博客（Blog），想搭建一个自己的博客网站。话说博客这东西，十几年前很流行，现在愈发变得越来越小众化了，而且门槛也比较高。&lt;/p&gt;
&lt;/blockquote&gt;
&lt;h2 id=&#34;1-为什么想用blog&#34;&gt;1、为什么想用Blog.&lt;/h2&gt;
&lt;p&gt;​     先说说自己为什么想要用博客吧，我一直想有一个可以写自己所感所想的地方，灵活度要高，而且属于自己，不会被打扰。乐趣在于记录生活，而且也不在乎写了会立马被别人看到。它就安安静静的在那里，如果有幸能让您感兴趣来看看的话，在随便一个浏览器地址栏里输入我的地址就能进。它既可以分享东西给大家，也可以写自己的私密内容。博客就像自己的一片小天地，把它从无到有一点一滴地建立起来，可以随时更改它的格调和布局，不用拘泥于各种形式和条条框框。更不会被删帖和禁言。下面列几个最近发现的整的还比较不错的博客： &lt;a href=&#34;https://www.zsxcool.com/&#34;&gt;戳这里：博客1&lt;/a&gt; &lt;a href=&#34;https://yeming.site/&#34;&gt;戳这里：博客2&lt;/a&gt; &lt;a href=&#34;https://blog.ixk.me/&#34;&gt;戳这里：博客3&lt;/a&gt;&lt;/p&gt;
&lt;p&gt;​     有人会问，你怎么不用微博呢？&lt;/p&gt;
&lt;p&gt;​     首先，“微博”即“微型博客”的简称，它在做到方便的同时也牺牲了博客本身的美。它作为大众增强互动的工具还是不错的，但是在形式上也只能算是“微”博。一、我不喜欢强行把文字和图片割裂开，先写完一堆话，下面再加上几个图；二、就普通发微博而言，格式的选择太过于单调，没有字体格式（颜色、字体、&lt;strong&gt;加粗&lt;/strong&gt;、&lt;em&gt;倾斜&lt;/em&gt;、等等），也没有段落格式（大小标题、首行缩进、居中、背景、等等）（现在编辑的头条文章都没有🙃 ），有人会说，这样是方便了书写，随心所欲，不繁琐，我就发个动态还管它那么多。确实如此，可是，每个人写出来的都是这样的格式，乱七八糟堆上几个字，再最后附上个六九图；要不就是加上几个＃话题，再塞上几行字，下面弄上个视频，感觉还不如小学生在Word上写的观后感作文。图片和视频不能共存你告诉我是为什么？非要发两次才行？如今的互联网产品同质化太过于严重，而且操作简单弱智化，功能阉割化娱乐化，感觉都是同质于在发微信朋友圈，只不过是换了个圈子，换了个软件，修改了几项功能。不过也正常，在这个娱乐至死的时代，只要让用户觉得开心，简单，快乐，沉溺就好了呗，别的提升先不管，先把娱乐类的直播、聊天、热度，互动给搞上去。就类似于国产车，实打实的硬件功能不给改进，车里的娱乐、影音啥的全弄上。&lt;/p&gt;
&lt;p&gt;​     其次，我感觉我现在越来越不想用微博了，不是掉进了粪坑就是掉进了🐔 窝……微博太浮躁了，功利心太强，戾气太重，文化垃圾太多。全都浮在热度上，沉不下去。就像初中高中的班主任常说的那样，“光景永远是看不够的”。而且我也不想追这个⭐ 那个⭐ 的。虚假的东西太多太多。我最恶心的就是不知廉耻的各种虚假人设。雪崩的时候没有一片雪花是无辜的。这方面我还是比较欣赏于大爷。好了好了，不谈圈，没有意义。&lt;/p&gt;
&lt;table&gt;
&lt;thead&gt;
&lt;tr&gt;
&lt;th&gt;&lt;a href=&#34;https://1.bp.blogspot.com/-w5foQ9RKjDQ/Xq_fKeGHdQI/AAAAAAAAAF4/Ul5YluLBdB0yhJv12qaZ5vQC-pjYq-UiQCLcBGAsYHQ/s1600/62c2bc1c187d467faecd32f71fb0a597.jpeg&#34;&gt;&lt;img src=&#34;https://1.bp.blogspot.com/-w5foQ9RKjDQ/Xq_fKeGHdQI/AAAAAAAAAF4/Ul5YluLBdB0yhJv12qaZ5vQC-pjYq-UiQCLcBGAsYHQ/s400/62c2bc1c187d467faecd32f71fb0a597.jpeg&#34; alt=&#34;img&#34; loading=&#34;lazy&#34;&gt;&lt;/a&gt;&lt;/th&gt;
&lt;/tr&gt;
&lt;/thead&gt;
&lt;tbody&gt;
&lt;tr&gt;
&lt;td&gt;麻麻～王源抽烟🚬 好帅啊！我也要学！&lt;/td&gt;
&lt;/tr&gt;
&lt;/tbody&gt;
&lt;/table&gt;
&lt;blockquote&gt;
&lt;p&gt;“工学者，巧心，劳力，造器物”&lt;/p&gt;
&lt;/blockquote&gt;
&lt;h2 id=&#34;2-关于blog的一些想法&#34;&gt;2、关于Blog的一些想法.&lt;/h2&gt;
&lt;p&gt;​    额，扯远了，我的初步想法是，我想在我的博客网站上，一方面能够记录我的生活，每天写点小随笔，而且能在文章中配上拍的照片或者图片，写点心得体会；另一方面，我想建一个可以实时添加更新的带时间轴那种相册，可以设置每个相册的主题，进去可以根据时间轴上标注的事件名称纵览都发生过什么有趣的事情，而且每个相册还可以添加背景音乐还有其他等等的小部件啥的。我在想，我要是大一就开始弄就好了，能够把整个大学四年系统地记录下来。哈哈哈，人生总是充满着各种遗憾，时光也总是不能重来。&lt;/p&gt;
&lt;p&gt;​     其他功能的话还没想好，可以根据需要再往上加。我看他们好多都在博客上分享各种小技巧和实用功能啥的，我感觉就我这水平，我还是往后稍稍吧😂&lt;/p&gt;
&lt;p&gt;​&lt;/p&gt;
&lt;p&gt;​    每次看到网上那些大神们的精美的博客，简直不能再羡慕。但是对于我这种学农的小白来说，真的可以说是心有余而力不足。理想很丰满，现实很骨感。一方面，对各种计算机语言和代码一窍不通，如看天书；另一方面，搭建一个个人博客，不仅前期得租域名，买服务器，买图床……买了域名还得去备案……而且还需要用Worldpress等平台开发博客。想想我头就大了。而且，一入侯门深似海，就跟会员一样，一旦打算开始每年租着域名了，就不可能停租了，不然域名一没，网站也就打不开了，长时间打理的心血也付之东流。我还是在纠结到底要不要整起来，又怕自己是心血来潮，当代恶臭年轻人，做啥也坚持不了多久。&lt;/p&gt;
&lt;p&gt;​     之前也写过几篇博客，用的是Google的Blogger平台，基本功能比较完备，但还是略显简陋，而且最重要的一点是撰写和浏览都得翻墙，太不方便，而且评论功能做的也不太好。地址是https://a01aaa.blogspot.com/ &lt;a href=&#34;https://a01aaa.blogspot.com/&#34;&gt;戳这里可直达我的Google Blogger❤️ &lt;/a&gt; 如果有谁感兴趣的话可以上去看看😂 没怎么太完善，而且用的是Google Blogger自带的网址，没有租自己的域名，也算是弃用了。注意需要科学上网。&lt;/p&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;1&#34;&gt;&lt;a href=&#34;https://1.bp.blogspot.com/-TUyf5oziI7c/Xq_fkeBiyxI/AAAAAAAAAGA/fiFklvc8pRc_OHl5FJieeykKaGXxjiwXACLcBGAsYHQ/s1600/1576203380178.png&#34;&gt;&lt;img src=&#34;https://1.bp.blogspot.com/-TUyf5oziI7c/Xq_fkeBiyxI/AAAAAAAAAGA/fiFklvc8pRc_OHl5FJieeykKaGXxjiwXACLcBGAsYHQ/s320/1576203380178.png&#34; alt=&#34;img&#34; loading=&#34;lazy&#34;&gt;&lt;/a&gt;&lt;/figure&gt;
&lt;p&gt;最近看了一些教程，找到了一些替代办法，比如可以用Gridea和GitHub Pages或者GitHub+Hexo搭建个人博客，但也还是很麻烦😷 唉……算了，Blog这个问题先搁置吧，等以后有空了再说吧，先慢慢了解学着基础知识，如果哪天我的博客真建成了，一定通知大家😂 。不过也千万别抱太大希望，说不定第二天我就忘了😂 又回到了“游戏它不香吗，抖音它不香吗”的咸鱼状态了😂 。&lt;/p&gt;
&lt;p&gt;​     我感觉我就是那种，一有点什么想法就想写下来。相对于拍视频，拍Vlog，我觉得文字这东西更让人着迷，写完一篇文章也有助于自己思路的整理和各方面的提升，真的是可以将其作为一种享受的过程。但是如果是写自己不愿意写的东西，比如论文，＊＊汇报，总结等等的，那就另当别论了。&lt;/p&gt;
&lt;hr&gt;
&lt;p&gt;​     最后，给大家分享个有趣的东西，最近在研究域名的时候，发现现在各种中文域名也可以了哎😂&lt;/p&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;2&#34;&gt;&lt;a href=&#34;https://1.bp.blogspot.com/-h73zghqu7Ys/Xq_fxsfPwpI/AAAAAAAAAGE/NdGLlR-b3VkHg99lQsZ_wcDcWWRoa9AOACLcBGAsYHQ/s1600/Snipaste_2020-05-04_15-58-57.png&#34;&gt;&lt;img src=&#34;https://1.bp.blogspot.com/-h73zghqu7Ys/Xq_fxsfPwpI/AAAAAAAAAGE/NdGLlR-b3VkHg99lQsZ_wcDcWWRoa9AOACLcBGAsYHQ/s320/Snipaste_2020-05-04_15-58-57.png&#34; alt=&#34;img&#34; loading=&#34;lazy&#34;&gt;&lt;/a&gt;&lt;/figure&gt;
&lt;p&gt;​    比如  .我爱你 这个域名就很有意思，很多用这个域名建的情侣空间，这几天找到的很多私人的都失效了，不知道是因为分手了还是咋了😂 只找到以下几个：&lt;/p&gt;
&lt;p&gt;张国荣.我爱你&lt;/p&gt;
&lt;p&gt;爹娘.我爱你&lt;/p&gt;
&lt;p&gt;路祥.我爱你&lt;/p&gt;
&lt;p&gt;​     这三个随便一个复制（直接打字也行，字也不多）到浏览器地址栏里面都能直接打开，有点意思哈👍🏻 大家感兴趣的可以试试😂&lt;/p&gt;
&lt;hr&gt;
&lt;p&gt;​     唠唠叨叨写了这么多，净说了些没用的😂。 谁要是看到这里了应该都觉得无聊死了吧。在微博这个头条文章里写东西是真的累，什么格式也设置不了，光标还老是乱跳，一不小心字就打到别的地方去了……体验极差。我还是早日把我的博客提上日程吧……要不是没建好也不至于在这费这劲。而且这也没有表情可以选择……前面的表情都是输入法自带的……绝了。&lt;/p&gt;
&lt;hr&gt;
&lt;p&gt;​     最后，今天是五四青年节哎，在这里祝每一个看到这篇文章的朋友节日快乐～也希望这疫情早日结束😷 ，因为这疫情而耽误的人和事太多太多了。&lt;/p&gt;
&lt;p&gt;​    武汉加油！湖北加油！祖国加油！&lt;/p&gt;
&lt;p&gt;​    顺遂&lt;/p&gt;
&lt;p&gt;时祺&lt;/p&gt;
&lt;p&gt;2020.5.4&lt;/p&gt;
&lt;hr&gt;
&lt;p&gt;𝓘 𝓵𝓸𝓿𝓮 𝔂𝓸𝓾 𝓽𝓱𝓻𝓮𝓮 𝓽𝓱𝓸𝓾𝓼𝓪𝓷𝓭 𝓽𝓲𝓶𝓮𝓼❤&lt;/p&gt;
&lt;p&gt;🌹&lt;/p&gt;
">随笔杂谈</a>

&lt;p&gt;🌁  你可以任意使用应用内默认主题或任意第三方主题，强大的主题自定义能力&lt;/p&gt;
&lt;p&gt;🖥  你可以自定义源文件夹，利用 OneDrive、百度网盘、iCloud、Dropbox 等进行多设备同步&lt;/p&gt;

<script>
  // var escape = "[{&#34;content&#34;:&#34;&lt;p&gt;#Typora For Markdown 语法&lt;/p&gt;\n&lt;p&gt;[TOC]&lt;/p&gt;\n&lt;p&gt;###数学表达式&lt;/p&gt;\n&lt;p&gt;要启用这个功能，首先到&lt;code&gt;Preference&lt;/code&gt;-&amp;gt;&lt;code&gt;Editor&lt;/code&gt;中启用。然后使用&lt;code&gt;$&lt;/code&gt;符号包裹Tex命令，例如：&lt;code&gt;$lim_{x \\to \\infty} \\ exp(-x)=0$&lt;/code&gt;将产生如下的数学表达式：&lt;/p&gt;\n&lt;p&gt;&lt;span class=\&#34;katex\&#34;&gt;&lt;span class=\&#34;katex-mathml\&#34;&gt;&lt;math&gt;&lt;semantics&gt;&lt;mrow&gt;&lt;msub&gt;&lt;mi&gt;lim&lt;/mi&gt;&lt;mo&gt;⁡&lt;/mo&gt;&lt;mrow&gt;&lt;mi&gt;x&lt;/mi&gt;&lt;mo&gt;→&lt;/mo&gt;&lt;mi mathvariant=\&#34;normal\&#34;&gt;∞&lt;/mi&gt;&lt;/mrow&gt;&lt;/msub&gt;&lt;mi&gt;exp&lt;/mi&gt;&lt;mo&gt;⁡&lt;/mo&gt;&lt;mo&gt;(&lt;/mo&gt;&lt;mo&gt;−&lt;/mo&gt;&lt;mi&gt;x&lt;/mi&gt;&lt;mo&gt;)&lt;/mo&gt;&lt;mo&gt;=&lt;/mo&gt;&lt;mn&gt;0&lt;/mn&gt;&lt;/mrow&gt;&lt;annotation encoding=\&#34;application/x-tex\&#34;&gt;\\lim_{x \\to \\infty} \\exp(-x)=0&lt;/annotation&gt;&lt;/semantics&gt;&lt;/math&gt;&lt;/span&gt;&lt;span class=\&#34;katex-html\&#34; aria-hidden=\&#34;true\&#34;&gt;&lt;span class=\&#34;base\&#34;&gt;&lt;span class=\&#34;strut\&#34; style=\&#34;height:1em;vertical-align:-0.25em;\&#34;&gt;&lt;/span&gt;&lt;span class=\&#34;mop\&#34;&gt;&lt;span class=\&#34;mop\&#34;&gt;lim&lt;/span&gt;&lt;span class=\&#34;msupsub\&#34;&gt;&lt;span class=\&#34;vlist-t vlist-t2\&#34;&gt;&lt;span class=\&#34;vlist-r\&#34;&gt;&lt;span class=\&#34;vlist\&#34; style=\&#34;height:0.151392em;\&#34;&gt;&lt;span style=\&#34;top:-2.5500000000000003em;margin-right:0.05em;\&#34;&gt;&lt;span class=\&#34;pstrut\&#34; style=\&#34;height:2.7em;\&#34;&gt;&lt;/span&gt;&lt;span class=\&#34;sizing reset-size6 size3 mtight\&#34;&gt;&lt;span class=\&#34;mord mtight\&#34;&gt;&lt;span class=\&#34;mord mathdefault mtight\&#34;&gt;x&lt;/span&gt;&lt;span class=\&#34;mrel mtight\&#34;&gt;→&lt;/span&gt;&lt;span class=\&#34;mord mtight\&#34;&gt;∞&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;vlist-s\&#34;&gt;​&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;vlist-r\&#34;&gt;&lt;span class=\&#34;vlist\&#34; style=\&#34;height:0.15em;\&#34;&gt;&lt;span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;mspace\&#34; style=\&#34;margin-right:0.16666666666666666em;\&#34;&gt;&lt;/span&gt;&lt;span class=\&#34;mop\&#34;&gt;exp&lt;/span&gt;&lt;span class=\&#34;mopen\&#34;&gt;(&lt;/span&gt;&lt;span class=\&#34;mord\&#34;&gt;−&lt;/span&gt;&lt;span class=\&#34;mord mathdefault\&#34;&gt;x&lt;/span&gt;&lt;span class=\&#34;mclose\&#34;&gt;)&lt;/span&gt;&lt;span class=\&#34;mspace\&#34; style=\&#34;margin-right:0.2777777777777778em;\&#34;&gt;&lt;/span&gt;&lt;span class=\&#34;mrel\&#34;&gt;=&lt;/span&gt;&lt;span class=\&#34;mspace\&#34; style=\&#34;margin-right:0.2777777777777778em;\&#34;&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;base\&#34;&gt;&lt;span class=\&#34;strut\&#34; style=\&#34;height:0.64444em;vertical-align:0em;\&#34;&gt;&lt;/span&gt;&lt;span class=\&#34;mord\&#34;&gt;0&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;\n&lt;p&gt;###下标&lt;/p&gt;\n&lt;p&gt;下标使用&lt;code&gt;~&lt;/code&gt;包裹，例如：&lt;code&gt;H~2~O&lt;/code&gt;将产生H&lt;sub&gt;2&lt;/sub&gt;O, 即水的分子式。&lt;/p&gt;\n&lt;p&gt;###上标&lt;/p&gt;\n&lt;p&gt;上标使用&lt;code&gt;^&lt;/code&gt;包裹，例如：&lt;code&gt;y^2^=4&lt;/code&gt;将产生表达式y&lt;sup&gt;2&lt;/sup&gt; = 4&lt;/p&gt;\n&lt;p&gt;###插入表情:happy:&lt;/p&gt;\n&lt;p&gt;使用&lt;code&gt;:happy:&lt;/code&gt;输入表情:happy:,使用&lt;code&gt;:sad:&lt;/code&gt;输入表情:sad:,使用&lt;code&gt;:cry:&lt;/code&gt;输入表情😢等。以此类推！&lt;/p&gt;\n&lt;h3 id=\&#34;下划线\&#34;&gt;下划线&lt;/h3&gt;\n&lt;p&gt;用HTML的语法&lt;code&gt;&amp;lt;u&amp;gt;Underline&amp;lt;/u&amp;gt;&lt;/code&gt;将产生下划线&lt;u&gt;Underline&lt;/u&gt;.&lt;/p&gt;\n&lt;h3 id=\&#34;删除线\&#34;&gt;删除线&lt;/h3&gt;\n&lt;p&gt;GFM添加了删除文本的语法，这是标准的Markdown语法木有的。使用&lt;code&gt;~~&lt;/code&gt;包裹的文本将会具有删除的样式，例如&lt;code&gt;~删除文本~&lt;/code&gt;将产生&lt;s&gt;删除文本&lt;/s&gt;的样式。&lt;/p&gt;\n&lt;h3 id=\&#34;代码\&#34;&gt;代码&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;使用`包裹的内容将会以代码样式显示，例如&lt;/li&gt;\n&lt;/ul&gt;\n&lt;pre&gt;&lt;code&gt;使用`printf()`\n&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;则会产生&lt;code&gt;printf()&lt;/code&gt;样式。&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;输入&lt;code&gt;~~~&lt;/code&gt;或者```然后回车，可以输入代码块，并且可以选择代码的语言。例如：&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;pre&gt;&lt;code&gt;```java\npublic Class HelloWorld{\n  System.out.println(&amp;quot;Hello World!&amp;quot;);\n}\n```\n&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;将会产生&lt;/p&gt;\n&lt;pre&gt;&lt;code class=\&#34;language-java\&#34;&gt;public Class HelloWorld{\n  System.out.println(&amp;quot;Hello World!&amp;quot;);\n}\n&lt;/code&gt;&lt;/pre&gt;\n&lt;h3 id=\&#34;强调\&#34;&gt;强调&lt;/h3&gt;\n&lt;p&gt;使用两个*号或者两个_包裹的内容将会被强调。例如&lt;/p&gt;\n&lt;pre&gt;&lt;code&gt;**使用两个*号强调内容**\n__使用两个下划线强调内容__\n&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;将会输出&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;使用两个*号强调内容&lt;/strong&gt;&lt;br&gt;\n&lt;strong&gt;使用两个下划线强调内容&lt;/strong&gt;&lt;br&gt;\nTyproa 推荐使用两个*号。&lt;/p&gt;\n&lt;h3 id=\&#34;斜体\&#34;&gt;斜体&lt;/h3&gt;\n&lt;p&gt;在标准的Markdown语法中，*和_包裹的内容会是斜体显示，但是GFM下划线一般用来分隔人名和代码变量名，因此我们推荐是用星号来包裹斜体内容。如果要显示星号，则使用转义：&lt;/p&gt;\n&lt;pre&gt;&lt;code&gt;\\*\n&lt;/code&gt;&lt;/pre&gt;\n&lt;h3 id=\&#34;插入图片\&#34;&gt;插入图片&lt;/h3&gt;\n&lt;p&gt;我们可以通过拖拉的方式，将本地文件夹中的图片或者网络上的图片插入。&lt;/p&gt;\n&lt;figure data-type=\&#34;image\&#34; tabindex=\&#34;1\&#34;&gt;&lt;img src=\&#34;http://typora.io/img/drag-img.gif\&#34; alt=\&#34;drag and drop image\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/figure&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3 id=\&#34;插入url连接\&#34;&gt;插入URL连接&lt;/h3&gt;\n&lt;p&gt;使用尖括号包裹的url将产生一个连接，例如：&lt;code&gt;&amp;lt;www.baidu.com&amp;gt;&lt;/code&gt;将产生连接:&amp;lt;www.baidu.com&amp;gt;.&lt;/p&gt;\n&lt;p&gt;如果是标准的url，则会自动产生连接，例如:www.google.com&lt;/p&gt;\n&lt;h3 id=\&#34;目录列表table-of-contentstoc\&#34;&gt;目录列表Table of Contents（TOC）&lt;/h3&gt;\n&lt;p&gt;输入[toc]然后回车，将会产生一个目录，这个目录抽取了文章的所有标题，自动更新内容。&lt;/p&gt;\n&lt;h3 id=\&#34;水平分割线\&#34;&gt;水平分割线&lt;/h3&gt;\n&lt;p&gt;使用&lt;code&gt;***&lt;/code&gt;或者&lt;code&gt;---&lt;/code&gt;，然后回车，来产生水平分割线。&lt;/p&gt;\n&lt;hr&gt;\n&lt;h3 id=\&#34;标注\&#34;&gt;标注&lt;/h3&gt;\n&lt;p&gt;我们可以对某一个词语进行标注。例如&lt;/p&gt;\n&lt;pre&gt;&lt;code&gt;某些人用过了才知道[^注释]\n[^注释]:Somebody that I used to know.\n&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;将产生：&lt;/p&gt;\n&lt;p&gt;某些人用过了才知道&lt;sup class=\&#34;footnote-ref\&#34;&gt;&lt;a href=\&#34;#fn1\&#34; id=\&#34;fnref1\&#34;&gt;[1]&lt;/a&gt;&lt;/sup&gt;&lt;/p&gt;\n&lt;p&gt;把鼠标放在&lt;code&gt;注释&lt;/code&gt;上，将会有提示内容。&lt;/p&gt;\n&lt;h3 id=\&#34;表格\&#34;&gt;表格&lt;/h3&gt;\n&lt;pre&gt;&lt;code&gt;|姓名|性别|毕业学校|工资|\n|:---|:---:|:---:|---:|\n|杨洋|男|重庆交通大学|3200|\n|峰哥|男|贵州大学|5000|\n|坑货|女|北京大学|2000|\n&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;将产生:&lt;/p&gt;\n&lt;table&gt;\n&lt;thead&gt;\n&lt;tr&gt;\n&lt;th style=\&#34;text-align:left\&#34;&gt;姓名&lt;/th&gt;\n&lt;th style=\&#34;text-align:center\&#34;&gt;性别&lt;/th&gt;\n&lt;th style=\&#34;text-align:center\&#34;&gt;毕业学校&lt;/th&gt;\n&lt;th style=\&#34;text-align:right\&#34;&gt;工资&lt;/th&gt;\n&lt;/tr&gt;\n&lt;/thead&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td style=\&#34;text-align:left\&#34;&gt;杨洋&lt;/td&gt;\n&lt;td style=\&#34;text-align:center\&#34;&gt;男&lt;/td&gt;\n&lt;td style=\&#34;text-align:center\&#34;&gt;重庆交通大学&lt;/td&gt;\n&lt;td style=\&#34;text-align:right\&#34;&gt;3200&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td style=\&#34;text-align:left\&#34;&gt;峰哥&lt;/td&gt;\n&lt;td style=\&#34;text-align:center\&#34;&gt;男&lt;/td&gt;\n&lt;td style=\&#34;text-align:center\&#34;&gt;贵州大学&lt;/td&gt;\n&lt;td style=\&#34;text-align:right\&#34;&gt;5000&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td style=\&#34;text-align:left\&#34;&gt;坑货&lt;/td&gt;\n&lt;td style=\&#34;text-align:center\&#34;&gt;女&lt;/td&gt;\n&lt;td style=\&#34;text-align:center\&#34;&gt;北京大学&lt;/td&gt;\n&lt;td style=\&#34;text-align:right\&#34;&gt;2000&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;p&gt;其中代码的第二行指定对齐的方式，第一个是左对齐，第二个和第三个是居中，最后一个是右对齐。&lt;/p&gt;\n&lt;h3 id=\&#34;数学表达式块\&#34;&gt;数学表达式块&lt;/h3&gt;\n&lt;p&gt;输入两个美元符号，然后回车，就可以输入数学表达式块了。例如：&lt;/p&gt;\n&lt;pre&gt;&lt;code&gt; $$\\mathbf{V}_1 \\times \\mathbf{V}_2 =  \\begin{vmatrix} \\mathbf{i} &amp;amp; \\mathbf{j} &amp;amp; \\mathbf{k} \\\\\\frac{\\partial X}{\\partial u} &amp;amp;  \\frac{\\partial Y}{\\partial u} &amp;amp; 0 \\\\\\frac{\\partial X}{\\partial v} &amp;amp;  \\frac{\\partial Y}{\\partial v} &amp;amp; 0 \\\\\\end{vmatrix}$$\n&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;将会产生:&lt;/p&gt;\n&lt;p class=&#39;katex-block&#39;&gt;&lt;span class=\&#34;katex-display\&#34;&gt;&lt;span class=\&#34;katex\&#34;&gt;&lt;span class=\&#34;katex-mathml\&#34;&gt;&lt;math&gt;&lt;semantics&gt;&lt;mrow&gt;&lt;msub&gt;&lt;mi mathvariant=\&#34;bold\&#34;&gt;V&lt;/mi&gt;&lt;mn&gt;1&lt;/mn&gt;&lt;/msub&gt;&lt;mo&gt;×&lt;/mo&gt;&lt;msub&gt;&lt;mi mathvariant=\&#34;bold\&#34;&gt;V&lt;/mi&gt;&lt;mn&gt;2&lt;/mn&gt;&lt;/msub&gt;&lt;mo&gt;=&lt;/mo&gt;&lt;mrow&gt;&lt;mo fence=\&#34;true\&#34;&gt;∣&lt;/mo&gt;&lt;mtable&gt;&lt;mtr&gt;&lt;mtd&gt;&lt;mstyle scriptlevel=\&#34;0\&#34; displaystyle=\&#34;false\&#34;&gt;&lt;mi mathvariant=\&#34;bold\&#34;&gt;i&lt;/mi&gt;&lt;/mstyle&gt;&lt;/mtd&gt;&lt;mtd&gt;&lt;mstyle scriptlevel=\&#34;0\&#34; displaystyle=\&#34;false\&#34;&gt;&lt;mi mathvariant=\&#34;bold\&#34;&gt;j&lt;/mi&gt;&lt;/mstyle&gt;&lt;/mtd&gt;&lt;mtd&gt;&lt;mstyle scriptlevel=\&#34;0\&#34; displaystyle=\&#34;false\&#34;&gt;&lt;mi mathvariant=\&#34;bold\&#34;&gt;k&lt;/mi&gt;&lt;/mstyle&gt;&lt;/mtd&gt;&lt;/mtr&gt;&lt;mtr&gt;&lt;mtd&gt;&lt;mstyle scriptlevel=\&#34;0\&#34; displaystyle=\&#34;false\&#34;&gt;&lt;mfrac&gt;&lt;mrow&gt;&lt;mi mathvariant=\&#34;normal\&#34;&gt;∂&lt;/mi&gt;&lt;mi&gt;X&lt;/mi&gt;&lt;/mrow&gt;&lt;mrow&gt;&lt;mi mathvariant=\&#34;normal\&#34;&gt;∂&lt;/mi&gt;&lt;mi&gt;u&lt;/mi&gt;&lt;/mrow&gt;&lt;/mfrac&gt;&lt;/mstyle&gt;&lt;/mtd&gt;&lt;mtd&gt;&lt;mstyle scriptlevel=\&#34;0\&#34; displaystyle=\&#34;false\&#34;&gt;&lt;mfrac&gt;&lt;mrow n&gt;&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;\n&lt;h3 id=\&#34;任务列表\&#34;&gt;任务列表&lt;/h3&gt;\n&lt;p&gt;使用如下的代码创建任务列表，在[]中输入x表示完成，也可以通过点击选择完成或者没完成。&lt;/p&gt;\n&lt;pre&gt;&lt;code&gt;- [ ] 吃饭\n- [ ] 逛街\n- [ ] 看电影\n- [ ] 约泡\n&lt;/code&gt;&lt;/pre&gt;\n&lt;ul class=\&#34;contains-task-list\&#34;&gt;\n&lt;li class=\&#34;task-list-item\&#34;&gt;\n&lt;p&gt;&lt;input class=\&#34;task-list-item-checkbox\&#34; checked=\&#34;\&#34; disabled=\&#34;\&#34; type=\&#34;checkbox\&#34; id=\&#34;task-item-9409446\&#34;&gt;&lt;label class=\&#34;task-list-item-label\&#34; for=\&#34;task-item-9409446\&#34;&gt; 吃饭&lt;/label&gt;&lt;/p&gt;\n&lt;/li&gt;\n&lt;li class=\&#34;task-list-item\&#34;&gt;\n&lt;p&gt;&lt;input class=\&#34;task-list-item-checkbox\&#34; checked=\&#34;\&#34; disabled=\&#34;\&#34; type=\&#34;checkbox\&#34; id=\&#34;task-item-591349\&#34;&gt;&lt;label class=\&#34;task-list-item-label\&#34; for=\&#34;task-item-591349\&#34;&gt; 逛街&lt;/label&gt;&lt;/p&gt;\n&lt;/li&gt;\n&lt;li class=\&#34;task-list-item\&#34;&gt;\n&lt;p&gt;&lt;input class=\&#34;task-list-item-checkbox\&#34; checked=\&#34;\&#34; disabled=\&#34;\&#34; type=\&#34;checkbox\&#34; id=\&#34;task-item-613130\&#34;&gt;&lt;label class=\&#34;task-list-item-label\&#34; for=\&#34;task-item-613130\&#34;&gt; 看电影&lt;/label&gt;&lt;/p&gt;\n&lt;/li&gt;\n&lt;li class=\&#34;task-list-item\&#34;&gt;\n&lt;p&gt;&lt;input class=\&#34;task-list-item-checkbox\&#34; checked=\&#34;\&#34; disabled=\&#34;\&#34; type=\&#34;checkbox\&#34; id=\&#34;task-item-7480721\&#34;&gt;&lt;label class=\&#34;task-list-item-label\&#34; for=\&#34;task-item-7480721\&#34;&gt; 约泡&lt;/label&gt;&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3 id=\&#34;列表\&#34;&gt;列表&lt;/h3&gt;\n&lt;p&gt;输入+, -, *,创建无序的列表，使用任意数字开头，创建有序列表，例如：&lt;/p&gt;\n&lt;pre&gt;&lt;code&gt;**无序的列表**\n* tfboys\n* 杨洋\n* 我爱你\n&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;&lt;strong&gt;无序的列表&lt;/strong&gt;&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;tfboys&lt;/li&gt;\n&lt;li&gt;杨洋&lt;/li&gt;\n&lt;li&gt;我爱你&lt;/li&gt;\n&lt;/ul&gt;\n&lt;pre&gt;&lt;code&gt;**有序的列表**\n1. 苹果\n6. 香蕉\n10. 我都不喜欢\n&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;&lt;strong&gt;有序的列表&lt;/strong&gt;&lt;/p&gt;\n&lt;ol&gt;\n&lt;li&gt;苹果&lt;/li&gt;\n&lt;li&gt;香蕉&lt;/li&gt;\n&lt;li&gt;我都不喜欢&lt;/li&gt;\n&lt;/ol&gt;\n&lt;h3 id=\&#34;块引用\&#34;&gt;块引用&lt;/h3&gt;\n&lt;p&gt;使用&amp;gt;来插入块引用。例如：&lt;/p&gt;\n&lt;pre&gt;&lt;code&gt;&amp;gt;这是一个块引用！\n&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;将产生：&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;这是一个块引用！&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h3 id=\&#34;标题\&#34;&gt;标题&lt;/h3&gt;\n&lt;p&gt;使用#表示一级标题，##表示二级标题，以此类推，有6个标题。&lt;/p&gt;\n&lt;hr class=\&#34;footnotes-sep\&#34;&gt;\n&lt;section class=\&#34;footnotes\&#34;&gt;\n&lt;ol class=\&#34;footnotes-list\&#34;&gt;\n&lt;li id=\&#34;fn1\&#34; class=\&#34;footnote-item\&#34;&gt;&lt;p&gt;Somebody that I used to know. &lt;a href=\&#34;#fnref1\&#34; class=\&#34;footnote-backref\&#34;&gt;↩︎&lt;/a&gt;&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ol&gt;\n&lt;/section&gt;\n&#34;,&#34;fileName&#34;:&#34;typora-for-markdown-yu-fa&#34;,&#34;abstract&#34;:&#34;&#34;,&#34;title&#34;:&#34;Typora For Markdown 语法&#34;,&#34;tags&#34;:[],&#34;date&#34;:&#34;2020-05-05 10:57:12&#34;,&#34;dateFormat&#34;:&#34;2020-05-05&#34;,&#34;feature&#34;:&#34;&#34;,&#34;link&#34;:&#34;https://a01aaa.github.io/post/typora-for-markdown-yu-fa/&#34;,&#34;hideInList&#34;:false,&#34;isTop&#34;:false,&#34;stats&#34;:{&#34;text&#34;:&#34;5 min read&#34;,&#34;time&#34;:273000,&#34;words&#34;:1151,&#34;minutes&#34;:5},&#34;description&#34;:&#34;#Typora For Markdown 语法\n[TOC]\n###数学表达式\n要启用这个功能，首先到Preference-&amp;gt;Editor中启用。然后使用$符号包裹Tex命令，例如：$lim_{x \\to \\infty} \\ exp(-...&#34;,&#34;toc&#34;:&#34;&lt;ul class=\&#34;markdownIt-TOC\&#34;&gt;\n&lt;li&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E4%B8%8B%E5%88%92%E7%BA%BF\&#34;&gt;下划线&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E5%88%A0%E9%99%A4%E7%BA%BF\&#34;&gt;删除线&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E4%BB%A3%E7%A0%81\&#34;&gt;代码&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E5%BC%BA%E8%B0%83\&#34;&gt;强调&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E6%96%9C%E4%BD%93\&#34;&gt;斜体&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E6%8F%92%E5%85%A5%E5%9B%BE%E7%89%87\&#34;&gt;插入图片&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E6%8F%92%E5%85%A5url%E8%BF%9E%E6%8E%A5\&#34;&gt;插入URL连接&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E7%9B%AE%E5%BD%95%E5%88%97%E8%A1%A8table-of-contentstoc\&#34;&gt;目录列表Table of Contents（TOC）&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E6%B0%B4%E5%B9%B3%E5%88%86%E5%89%B2%E7%BA%BF\&#34;&gt;水平分割线&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E6%A0%87%E6%B3%A8\&#34;&gt;标注&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E8%A1%A8%E6%A0%BC\&#34;&gt;表格&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E6%95%B0%E5%AD%A6%E8%A1%A8%E8%BE%BE%E5%BC%8F%E5%9D%97\&#34;&gt;数学表达式块&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E4%BB%BB%E5%8A%A1%E5%88%97%E8%A1%A8\&#34;&gt;任务列表&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E5%88%97%E8%A1%A8\&#34;&gt;列表&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E5%9D%97%E5%BC%95%E7%94%A8\&#34;&gt;块引用&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E6%A0%87%E9%A2%98\&#34;&gt;标题&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&#34;},{&#34;content&#34;:&#34;&lt;h1 id=\&#34;一-关于兴趣\&#34;&gt;一、关于兴趣&lt;/h1&gt;\n&lt;p&gt;​&lt;/p&gt;\n&lt;p&gt;​    因为这疫情，赋闲这么长时间在家，之前一直没时间玩、没时间做的都在这无聊的当儿一一玩了个遍，摸了个透。&lt;/p&gt;\n&lt;p&gt;​     最后我发现我真的是对植物一点都不感兴趣，可能只对冷冰冰的机械和程序、代码感兴趣，我想我当初真的应该去机电学院或者信院。不得不说，确实，兴趣才是最好的老师。&lt;/p&gt;\n&lt;p&gt;​     俗话说，女怕嫁错郎，男怕入错行😂 。不得不说，专业上写的那几个字对一个人发展的束缚还是蛮大的。马上就要毕业了，可能这神圣的大学四年也就成了人生中永远的一点遗憾了吧。之前一直不好意思或者是碍于面子不会这么直接直白地说出来承认，今天在这敢这么说出来也算是向前跨出了一步吧，彻底迈出了一个久滞的圈。话说，既然自己没有那种读了大学和专业以后果断放弃并回去重考、重新选择的勇气，那就走好前方的路吧还是。再细想想，谁又能做到自己做的就是自己喜欢的呢，不论是学习还是以后的工作、生活或者其他。随心所欲应该是每个人内心中的奢望吧。所以说，还是理性平常看待吧。（不想多展开细讲了）&lt;/p&gt;\n&lt;h1 id=\&#34;二-关于blog\&#34;&gt;二、关于Blog&lt;/h1&gt;\n&lt;blockquote&gt;\n&lt;p&gt;最近迷上了博客（Blog），想搭建一个自己的博客网站。话说博客这东西，十几年前很流行，现在愈发变得越来越小众化了，而且门槛也比较高。&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\&#34;1-为什么想用blog\&#34;&gt;1、为什么想用Blog.&lt;/h2&gt;\n&lt;p&gt;​     先说说自己为什么想要用博客吧，我一直想有一个可以写自己所感所想的地方，灵活度要高，而且属于自己，不会被打扰。乐趣在于记录生活，而且也不在乎写了会立马被别人看到。它就安安静静的在那里，如果有幸能让您感兴趣来看看的话，在随便一个浏览器地址栏里输入我的地址就能进。它既可以分享东西给大家，也可以写自己的私密内容。博客就像自己的一片小天地，把它从无到有一点一滴地建立起来，可以随时更改它的格调和布局，不用拘泥于各种形式和条条框框。更不会被删帖和禁言。下面列几个最近发现的整的还比较不错的博客： &lt;a href=\&#34;https://www.zsxcool.com/\&#34;&gt;戳这里：博客1&lt;/a&gt; &lt;a href=\&#34;https://yeming.site/\&#34;&gt;戳这里：博客2&lt;/a&gt; &lt;a href=\&#34;https://blog.ixk.me/\&#34;&gt;戳这里：博客3&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;​     有人会问，你怎么不用微博呢？&lt;/p&gt;\n&lt;p&gt;​     首先，“微博”即“微型博客”的简称，它在做到方便的同时也牺牲了博客本身的美。它作为大众增强互动的工具还是不错的，但是在形式上也只能算是“微”博。一、我不喜欢强行把文字和图片割裂开，先写完一堆话，下面再加上几个图；二、就普通发微博而言，格式的选择太过于单调，没有字体格式（颜色、字体、&lt;strong&gt;加粗&lt;/strong&gt;、&lt;em&gt;倾斜&lt;/em&gt;、等等），也没有段落格式（大小标题、首行缩进、居中、背景、等等）（现在编辑的头条文章都没有🙃 ），有人会说，这样是方便了书写，随心所欲，不繁琐，我就发个动态还管它那么多。确实如此，可是，每个人写出来的都是这样的格式，乱七八糟堆上几个字，再最后附上个六九图；要不就是加上几个＃话题，再塞上几行字，下面弄上个视频，感觉还不如小学生在Word上写的观后感作文。图片和视频不能共存你告诉我是为什么？非要发两次才行？如今的互联网产品同质化太过于严重，而且操作简单弱智化，功能阉割化娱乐化，感觉都是同质于在发微信朋友圈，只不过是换了个圈子，换了个软件，修改了几项功能。不过也正常，在这个娱乐至死的时代，只要让用户觉得开心，简单，快乐，沉溺就好了呗，别的提升先不管，先把娱乐类的直播、聊天、热度，互动给搞上去。就类似于国产车，实打实的硬件功能不给改进，车里的娱乐、影音啥的全弄上。&lt;/p&gt;\n&lt;p&gt;​     其次，我感觉我现在越来越不想用微博了，不是掉进了粪坑就是掉进了🐔 窝……微博太浮躁了，功利心太强，戾气太重，文化垃圾太多。全都浮在热度上，沉不下去。就像初中高中的班主任常说的那样，“光景永远是看不够的”。而且我也不想追这个⭐ 那个⭐ 的。虚假的东西太多太多。我最恶心的就是不知廉耻的各种虚假人设。雪崩的时候没有一片雪花是无辜的。这方面我还是比较欣赏于大爷。好了好了，不谈圈，没有意义。&lt;/p&gt;\n&lt;table&gt;\n&lt;thead&gt;\n&lt;tr&gt;\n&lt;th&gt;&lt;a href=\&#34;https://1.bp.blogspot.com/-w5foQ9RKjDQ/Xq_fKeGHdQI/AAAAAAAAAF4/Ul5YluLBdB0yhJv12qaZ5vQC-pjYq-UiQCLcBGAsYHQ/s1600/62c2bc1c187d467faecd32f71fb0a597.jpeg\&#34;&gt;&lt;img src=\&#34;https://1.bp.blogspot.com/-w5foQ9RKjDQ/Xq_fKeGHdQI/AAAAAAAAAF4/Ul5YluLBdB0yhJv12qaZ5vQC-pjYq-UiQCLcBGAsYHQ/s400/62c2bc1c187d467faecd32f71fb0a597.jpeg\&#34; alt=\&#34;img\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/a&gt;&lt;/th&gt;\n&lt;/tr&gt;\n&lt;/thead&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;麻麻～王源抽烟🚬 好帅啊！我也要学！&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;blockquote&gt;\n&lt;p&gt;“工学者，巧心，劳力，造器物”&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h2 id=\&#34;2-关于blog的一些想法\&#34;&gt;2、关于Blog的一些想法.&lt;/h2&gt;\n&lt;p&gt;​    额，扯远了，我的初步想法是，我想在我的博客网站上，一方面能够记录我的生活，每天写点小随笔，而且能在文章中配上拍的照片或者图片，写点心得体会；另一方面，我想建一个可以实时添加更新的带时间轴那种相册，可以设置每个相册的主题，进去可以根据时间轴上标注的事件名称纵览都发生过什么有趣的事情，而且每个相册还可以添加背景音乐还有其他等等的小部件啥的。我在想，我要是大一就开始弄就好了，能够把整个大学四年系统地记录下来。哈哈哈，人生总是充满着各种遗憾，时光也总是不能重来。&lt;/p&gt;\n&lt;p&gt;​     其他功能的话还没想好，可以根据需要再往上加。我看他们好多都在博客上分享各种小技巧和实用功能啥的，我感觉就我这水平，我还是往后稍稍吧😂&lt;/p&gt;\n&lt;p&gt;​&lt;/p&gt;\n&lt;p&gt;​    每次看到网上那些大神们的精美的博客，简直不能再羡慕。但是对于我这种学农的小白来说，真的可以说是心有余而力不足。理想很丰满，现实很骨感。一方面，对各种计算机语言和代码一窍不通，如看天书；另一方面，搭建一个个人博客，不仅前期得租域名，买服务器，买图床……买了域名还得去备案……而且还需要用Worldpress等平台开发博客。想想我头就大了。而且，一入侯门深似海，就跟会员一样，一旦打算开始每年租着域名了，就不可能停租了，不然域名一没，网站也就打不开了，长时间打理的心血也付之东流。我还是在纠结到底要不要整起来，又怕自己是心血来潮，当代恶臭年轻人，做啥也坚持不了多久。&lt;/p&gt;\n&lt;p&gt;​     之前也写过几篇博客，用的是Google的Blogger平台，基本功能比较完备，但还是略显简陋，而且最重要的一点是撰写和浏览都得翻墙，太不方便，而且评论功能做的也不太好。地址是https://a01aaa.blogspot.com/ &lt;a href=\&#34;https://a01aaa.blogspot.com/\&#34;&gt;戳这里可直达我的Google Blogger❤️ &lt;/a&gt; 如果有谁感兴趣的话可以上去看看😂 没怎么太完善，而且用的是Google Blogger自带的网址，没有租自己的域名，也算是弃用了。注意需要科学上网。&lt;/p&gt;\n&lt;figure data-type=\&#34;image\&#34; tabindex=\&#34;1\&#34;&gt;&lt;a href=\&#34;https://1.bp.blogspot.com/-TUyf5oziI7c/Xq_fkeBiyxI/AAAAAAAAAGA/fiFklvc8pRc_OHl5FJieeykKaGXxjiwXACLcBGAsYHQ/s1600/1576203380178.png\&#34;&gt;&lt;img src=\&#34;https://1.bp.blogspot.com/-TUyf5oziI7c/Xq_fkeBiyxI/AAAAAAAAAGA/fiFklvc8pRc_OHl5FJieeykKaGXxjiwXACLcBGAsYHQ/s320/1576203380178.png\&#34; alt=\&#34;img\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/a&gt;&lt;/figure&gt;\n&lt;p&gt;最近看了一些教程，找到了一些替代办法，比如可以用Gridea和GitHub Pages或者GitHub+Hexo搭建个人博客，但也还是很麻烦😷 唉……算了，Blog这个问题先搁置吧，等以后有空了再说吧，先慢慢了解学着基础知识，如果哪天我的博客真建成了，一定通知大家😂 。不过也千万别抱太大希望，说不定第二天我就忘了😂 又回到了“游戏它不香吗，抖音它不香吗”的咸鱼状态了😂 。&lt;/p&gt;\n&lt;p&gt;​     我感觉我就是那种，一有点什么想法就想写下来。相对于拍视频，拍Vlog，我觉得文字这东西更让人着迷，写完一篇文章也有助于自己思路的整理和各方面的提升，真的是可以将其作为一种享受的过程。但是如果是写自己不愿意写的东西，比如论文，＊＊汇报，总结等等的，那就另当别论了。&lt;/p&gt;\n&lt;hr&gt;\n&lt;p&gt;​     最后，给大家分享个有趣的东西，最近在研究域名的时候，发现现在各种中文域名也可以了哎😂&lt;/p&gt;\n&lt;figure data-type=\&#34;image\&#34; tabindex=\&#34;2\&#34;&gt;&lt;a href=\&#34;https://1.bp.blogspot.com/-h73zghqu7Ys/Xq_fxsfPwpI/AAAAAAAAAGE/NdGLlR-b3VkHg99lQsZ_wcDcWWRoa9AOACLcBGAsYHQ/s1600/Snipaste_2020-05-04_15-58-57.png\&#34;&gt;&lt;img src=\&#34;https://1.bp.blogspot.com/-h73zghqu7Ys/Xq_fxsfPwpI/AAAAAAAAAGE/NdGLlR-b3VkHg99lQsZ_wcDcWWRoa9AOACLcBGAsYHQ/s320/Snipaste_2020-05-04_15-58-57.png\&#34; alt=\&#34;img\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/a&gt;&lt;/figure&gt;\n&lt;p&gt;​    比如  .我爱你 这个域名就很有意思，很多用这个域名建的情侣空间，这几天找到的很多私人的都失效了，不知道是因为分手了还是咋了😂 只找到以下几个：&lt;/p&gt;\n&lt;p&gt;张国荣.我爱你&lt;/p&gt;\n&lt;p&gt;爹娘.我爱你&lt;/p&gt;\n&lt;p&gt;路祥.我爱你&lt;/p&gt;\n&lt;p&gt;​     这三个随便一个复制（直接打字也行，字也不多）到浏览器地址栏里面都能直接打开，有点意思哈👍🏻 大家感兴趣的可以试试😂&lt;/p&gt;\n&lt;hr&gt;\n&lt;p&gt;​     唠唠叨叨写了这么多，净说了些没用的😂。 谁要是看到这里了应该都觉得无聊死了吧。在微博这个头条文章里写东西是真的累，什么格式也设置不了，光标还老是乱跳，一不小心字就打到别的地方去了……体验极差。我还是早日把我的博客提上日程吧……要不是没建好也不至于在这费这劲。而且这也没有表情可以选择……前面的表情都是输入法自带的……绝了。&lt;/p&gt;\n&lt;hr&gt;\n&lt;p&gt;​     最后，今天是五四青年节哎，在这里祝每一个看到这篇文章的朋友节日快乐～也希望这疫情早日结束😷 ，因为这疫情而耽误的人和事太多太多了。&lt;/p&gt;\n&lt;p&gt;​    武汉加油！湖北加油！祖国加油！&lt;/p&gt;\n&lt;p&gt;​    顺遂&lt;/p&gt;\n&lt;p&gt;时祺&lt;/p&gt;\n&lt;p&gt;2020.5.4&lt;/p&gt;\n&lt;hr&gt;\n&lt;p&gt;𝓘 𝓵𝓸𝓿𝓮 𝔂𝓸𝓾 𝓽𝓱𝓻𝓮𝓮 𝓽𝓱𝓸𝓾𝓼𝓪𝓷𝓭 𝓽𝓲𝓶𝓮𝓼❤&lt;/p&gt;\n&lt;p&gt;🌹&lt;/p&gt;\n&#34;,&#34;fileName&#34;:&#34;sui-bi-za-tan&#34;,&#34;abstract&#34;:&#34;&#34;,&#34;title&#34;:&#34;随笔杂谈&#34;,&#34;tags&#34;:[],&#34;date&#34;:&#34;2020-05-05 03:00:07&#34;,&#34;dateFormat&#34;:&#34;2020-05-05&#34;,&#34;feature&#34;:&#34;&#34;,&#34;link&#34;:&#34;https://a01aaa.github.io/post/sui-bi-za-tan/&#34;,&#34;hideInList&#34;:false,&#34;isTop&#34;:false,&#34;stats&#34;:{&#34;text&#34;:&#34;9 min read&#34;,&#34;time&#34;:529000,&#34;words&#34;:2624,&#34;minutes&#34;:9},&#34;description&#34;:&#34;一、关于兴趣\n​\n​    因为这疫情，赋闲这么长时间在家，之前一直没时间玩、没时间做的都在这无聊的当儿一一玩了个遍，摸了个透。\n​     最后我发现我真的是对植物一点都不感兴趣，可能只对冷冰冰的机械和程序、代码感兴趣，我想我当初真的应该...&#34;,&#34;toc&#34;:&#34;&lt;ul class=\&#34;markdownIt-TOC\&#34;&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E4%B8%80-%E5%85%B3%E4%BA%8E%E5%85%B4%E8%B6%A3\&#34;&gt;一、关于兴趣&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E4%BA%8C-%E5%85%B3%E4%BA%8Eblog\&#34;&gt;二、关于Blog&lt;/a&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\&#34;#1-%E4%B8%BA%E4%BB%80%E4%B9%88%E6%83%B3%E7%94%A8blog\&#34;&gt;1、为什么想用Blog.&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#2-%E5%85%B3%E4%BA%8Eblog%E7%9A%84%E4%B8%80%E4%BA%9B%E6%83%B3%E6%B3%95\&#34;&gt;2、关于Blog的一些想法.&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&#34;},{&#34;content&#34;:&#34;&lt;p&gt;欢迎来到我的小站呀，很高兴遇见你！🤝&lt;/p&gt;\n&lt;h2 id=\&#34;关于本站\&#34;&gt;🏠 关于本站&lt;/h2&gt;\n&lt;p&gt;·本站是Mr.李打造的小小站点，目的是为了记录生活~&lt;/p&gt;\n&lt;h2 id=\&#34;博主是谁\&#34;&gt;👨‍💻 博主是谁&lt;/h2&gt;\n&lt;p&gt;·博主当然是Mr.李啦！笔名：金都三十八画生&lt;/p&gt;\n&lt;h2 id=\&#34;兴趣爱好\&#34;&gt;⛹ 兴趣爱好&lt;/h2&gt;\n&lt;p&gt;·机械、程序、代码&lt;/p&gt;\n&lt;h2 id=\&#34;联系我呀\&#34;&gt;📬 联系我呀&lt;/h2&gt;\n&lt;p&gt;·a01a@foxmail.com&lt;/p&gt;\n&#34;,&#34;fileName&#34;:&#34;about&#34;,&#34;abstract&#34;:&#34;&#34;,&#34;title&#34;:&#34;关于&#34;,&#34;tags&#34;:[],&#34;date&#34;:&#34;2019-01-25 19:09:48&#34;,&#34;dateFormat&#34;:&#34;2019-01-25&#34;,&#34;feature&#34;:&#34;&#34;,&#34;link&#34;:&#34;https://a01aaa.github.io/post/about/&#34;,&#34;hideInList&#34;:true,&#34;isTop&#34;:false,&#34;stats&#34;:{&#34;text&#34;:&#34;1 min read&#34;,&#34;time&#34;:16000,&#34;words&#34;:78,&#34;minutes&#34;:1},&#34;description&#34;:&#34;欢迎来到我的小站呀，很高兴遇见你！🤝\n🏠 关于本站\n·本站是Mr.李打造的小小站点，目的是为了记录生活~\n👨‍💻 博主是谁\n·博主当然是Mr.李啦！笔名：金都三十八画生\n⛹ 兴趣爱好\n·机械、程序、代码\n📬 联系我呀\n·a01a@...&#34;,&#34;toc&#34;:&#34;&lt;ul class=\&#34;markdownIt-TOC\&#34;&gt;\n&lt;li&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E5%85%B3%E4%BA%8E%E6%9C%AC%E7%AB%99\&#34;&gt;🏠 关于本站&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E5%8D%9A%E4%B8%BB%E6%98%AF%E8%B0%81\&#34;&gt;👨‍💻 博主是谁&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;
